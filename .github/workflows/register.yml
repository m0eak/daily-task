name: Daily Task Job

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '本次注册数量'
        required: false
        default: '40'

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run registration
        env:
          REG_COUNT: ${{ github.event.inputs.count || '40' }}
        run: |
          mkdir -p codex
          for i in $(seq 1 $REG_COUNT); do
            echo "========== 第 $i/$REG_COUNT 次注册 =========="
            python task_runner.py --once || true
            if [ "$i" -lt "$REG_COUNT" ]; then
              SLEEP=$((RANDOM % 20 + 10))
              echo "[*] 等待 ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

      - name: Upload tokens
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokens-${{ github.run_number }}-${{ github.run_attempt }}
          path: codex/
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify Telegram
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          COUNT=$(find exak -name '*.json' 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            MSG="🤖 *Daily Task Job*%0A%0A📎 本次产出 ${COUNT} 个结果，文件将逐个发送。"
          else
            MSG="🤖 *Daily Task Job*%0A%0A❌ 本次无产出%0A%0ARun: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" || true

          # 打包并发送所有生成的 JSON 文件
          if [ "$COUNT" -gt 0 ]; then
            ZIP_NAME="tokens_$(date +%Y%m%d_%H%M%S).zip"
            zip -r "$ZIP_NAME" codex/*.json
            
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@$ZIP_NAME" \
              -F "caption=📦 本次运行产出的账户打包 (共 ${COUNT} 个)" || true
          fi
