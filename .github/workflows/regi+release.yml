name: Daily Task Job

on:
  # schedule:
  #   - cron: "*/40 * * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "本次注册数量"
        required: false
        default: "40"

permissions:
  contents: write # 创建/更新 release 需要
  actions: read

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run registration
        env:
          REG_COUNT: ${{ github.event.inputs.count || '40' }}
          DEFAULT_WORKER_URL: ${{ secrets.DEFAULT_WORKER_URL }}
          DEFAULT_MF_USER: ${{ secrets.DEFAULT_MF_USER }}
          DEFAULT_MF_PASS: ${{ secrets.DEFAULT_MF_PASS }}
        run: |
          mkdir -p codex
          for i in $(seq 1 $REG_COUNT); do
            echo "========== 第 $i/$REG_COUNT 次注册 =========="
            python task_runner.py --once || true
            if [ "$i" -lt "$REG_COUNT" ]; then
              SLEEP=$((RANDOM % 20 + 10))
              echo "[*] 等待 ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

      - name: Upload tokens (artifact, keep 3 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokens-${{ github.run_number }}-${{ github.run_attempt }}
          path: codex/
          retention-days: 1  # GitHub Artifact 最小只能按“天”设置，无法做到 6 小时
          if-no-files-found: ignore

      - name: Install age
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Package + (Optional) Encrypt + Upload Release asset
        if: always()
        env:
          AGE_RECIPIENT: ${{ secrets.AGE_RECIPIENT }}
          ALLOW_PLAINTEXT_RELEASE: ${{ secrets.ALLOW_PLAINTEXT_RELEASE }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export TZ=Asia/Hong_Kong

          COUNT=$(( $(find codex -name '*.json' 2>/dev/null | wc -l) + 0 ))
          echo "COUNT=$COUNT"

          if [ "$COUNT" -le 0 ]; then
            echo "No json produced, skip release upload."
            exit 0
          fi

          ZIP_NAME="tokens.zip"
          MANIFEST="manifest.json"

          rm -f "$ZIP_NAME" "$MANIFEST" tokens.zip.age
          zip -r "$ZIP_NAME" codex/*.json

          # Decide whether to encrypt
          ENCRYPTED=false
          ASSET_NAME="tokens.zip"

          if [ -n "${AGE_RECIPIENT:-}" ]; then
            ENCRYPTED=true
            ASSET_NAME="tokens.zip.age"
            age -r "$AGE_RECIPIENT" -o "$ASSET_NAME" "$ZIP_NAME"
          else
            echo "AGE_RECIPIENT not set: will NOT encrypt."
            echo "WARNING: uploading plaintext tokens.zip to a GitHub Release is dangerous on public repos."
            if [ "${ALLOW_PLAINTEXT_RELEASE:-}" != "true" ]; then
              echo "Skip release upload. To force plaintext upload, set secret ALLOW_PLAINTEXT_RELEASE=true."
              exit 0
            fi
            mv "$ZIP_NAME" "$ASSET_NAME"
          fi

          SHA256=$(sha256sum "$ASSET_NAME" | awk '{print $1}')
          DATE_TAG=$(date +%Y%m%d-%H%M%S)
          TAG="tokens-${DATE_TAG}-r${GITHUB_RUN_NUMBER}-a${GITHUB_RUN_ATTEMPT}"

          cat > "$MANIFEST" <<EOF
          {
            "tag": "${TAG}",
            "sha256": "${SHA256}",
            "count": ${COUNT},
            "encrypted": ${ENCRYPTED},
            "asset_name": "${ASSET_NAME}",
            "generated_at": "$(date -Is)"
          }
          EOF

          create_release() {
            local attempt
            for attempt in 1 2 3; do
              echo "[*] gh release create attempt ${attempt}/3 for ${TAG}"
              if gh release create "$TAG" \
                --title "Tokens ${DATE_TAG}" \
                --notes "Token bundle (encrypted=${ENCRYPTED})." \
                --latest=false; then
                return 0
              fi
              echo "[!] gh release create failed (attempt ${attempt}). Sleeping..."
              sleep $((attempt * 5))
            done
            return 1
          }

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists: $TAG"
          else
            # Important: gh may have created the git tag even if release creation fails.
            # We must verify release existence explicitly, otherwise we end up with "tag only".
            create_release
          fi

          # Verify release really exists (not just a tag)
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url' 2>/dev/null || true)
          if [ -z "${RELEASE_URL:-}" ]; then
            echo "ERROR: Release verification failed for tag=$TAG (tag may exist, but release object missing)."
            echo "Tip: check GitHub API /rate limits / permissions; this job will fail so we notice."
            exit 1
          fi
          echo "Release verified: ${RELEASE_URL}"

          # Upload assets (with retries) and verify assets exist on the release.
          upload_assets() {
            local attempt
            for attempt in 1 2 3; do
              echo "[*] gh release upload attempt ${attempt}/3"
              if gh release upload "$TAG" "$ASSET_NAME" "$MANIFEST" --clobber; then
                return 0
              fi
              echo "[!] gh release upload failed (attempt ${attempt}). Sleeping..."
              sleep $((attempt * 5))
            done
            return 1
          }

          upload_assets

          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          echo "Assets on release:"; echo "$ASSETS" | sed -n '1,200p'

          echo "$ASSETS" | grep -qx "$ASSET_NAME" || { echo "ERROR: missing asset: $ASSET_NAME"; exit 1; }
          echo "$ASSETS" | grep -qx "$MANIFEST"  || { echo "ERROR: missing asset: $MANIFEST"; exit 1; }

          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "COUNT=$COUNT" >> $GITHUB_ENV
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV

          # Keep the old final output format (tag URL) for compatibility,
          # but also output the verified release URL so we can debug quickly.
          echo "${RELEASE_URL}"
          echo "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
      - name: Notify Telegram (lightweight, optional)
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          COUNT=$(( $(find codex -name '*.json' 2>/dev/null | wc -l) + 0 ))

          if [ "$COUNT" -gt 0 ]; then
            MSG="Tokens generated, Count: ${COUNT}, Run: #${GITHUB_RUN_NUMBER}"
          else
            MSG="No output, Run: #${GITHUB_RUN_NUMBER}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" >/dev/null || true
