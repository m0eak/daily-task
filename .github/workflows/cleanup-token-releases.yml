name: Cleanup old token releases (keep 6 hours)

on:
  schedule:
    - cron: "0 */8 * * *"  # 每小时清一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete token releases older than 6 hours
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP_HOURS: 48
        run: |
          set -euo pipefail

          cutoff_epoch=$(date -u -d "${KEEP_HOURS} hours ago" +%s)
          echo "Cutoff epoch (delete if created_at < cutoff): $cutoff_epoch"

          gh api "repos/${REPO}/releases?per_page=100" --paginate |
            jq -r '.[] | [.tag_name, .created_at] | @tsv' |
          while IFS=$'\t' read -r tag created_at; do
            case "$tag" in
              tokens-*)
                created_epoch=$(date -u -d "$created_at" +%s)
                if [ "$created_epoch" -lt "$cutoff_epoch" ]; then
                  echo "Deleting old token release: $tag (created_at=$created_at)"
                  gh release delete "$tag" -y -R "$REPO"
                fi
                ;;
            esac
          done
